name: Docker Image Build and Publish

on:
  schedule:
    - cron: '0 0 1 * *'
  push:
    branches: [ "main" ]
    tags: [ 'v*' ]

env:
  REGISTRY: ghcr.io

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      filters: ${{ steps.set-matrix.outputs.filters }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          python3 -c "
          import yaml, json, os
          with open('config.yml', 'r') as f:
              config = yaml.safe_load(f)
          images = config.get('images', [])
          filters = {}
          for img in images:
              path = img['context']
              if path.startswith('./'): path = path[2:]
              filters[img['name']] = [f'{path}/**']
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'matrix={json.dumps(images)}\n')
              f.write('filters<<EOF\n')
              f.write(yaml.dump(filters))
              f.write('EOF\n')
          "

  filter-changes:
    needs: setup
    runs-on: ubuntu-latest
    outputs:
      changes: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: ${{ needs.setup.outputs.filters }}

  build:
    name: Build ${{ matrix.name }} Dockerfile and Push
    needs: [setup, filter-changes]
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.ref_type == 'tag' ||
      contains(fromJSON(needs.filter-changes.outputs.changes), matrix.name)
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker Image Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
      - name: Build and Push Docker Image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # cache-from: type=gha
          # cache-to: type=gha,mode=max
      - name: Generate Build Attestation (SLSA)
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
