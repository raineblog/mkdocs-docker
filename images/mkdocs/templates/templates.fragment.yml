theme:
    name: null
    custom_dir: /app/mkdocs-fragment-theme/
    language: zh
    palette:
        scheme: default
    icon:
        repo: fontawesome/brands/git-alt
        edit: material/pencil
        view: material/eye
plugins:
- markdown-exec
- table-reader
-   minify_html:
        allow_noncompliant_unquoted_attribute_values: false
        allow_optimal_entities: false
        allow_removing_spaces_between_attributes: false
        keep_closing_tags: true
        keep_comments: false
        keep_html_and_head_opening_tags: true
        keep_input_type_text_attr: true
        keep_ssi_comments: false
        minify_css: true
        minify_doctype: false
        minify_js: true
        preserve_brace_template_syntax: true
        preserve_chevron_percent_template_syntax: true
        remove_bangs: false
        remove_processing_instructions: false
-   katex-ssr: # 自己做的插件
        # disable: true # 禁用 ssr，仅植入 js 代码
        katex_dist: "https://cdn.jsdelivr.net/npm/katex@0.16.27/dist/"
        add_katex_css: true
        katex_css_filename: "katex-swap.min.css"
        ssr_contribs:
            - mhchem
        client_scripts:
            - copy-tex
        katex_options:
            trust: true
            macros:
                # 下面是一些符号的兼容性定义
                "\\RR": "\\mathbb{R}"
                "\\i": "\\mathrm{i}"
                "\\d": "\\mathrm{d}"
                "\\C": "\\mathbb{C}"
                "\\R": "\\mathbb{R}"
                "\\Q": "\\mathbb{Q}"
                "\\Z": "\\mathbb{Z}"
                "\\N": "\\mathbb{N}"
                "\\P": "\\mathbb{P}"
                "\\degree": "^\\circ"
                "\\rank": "\\operatorname{rank}" # 矩阵的秩
                # 下面是一些简写的定义
                "\\op": "\\operatorname"
                "\\paren": "\\left({#1}\\right)"
                "\\bracket": "\\left[{#1}\\right]"
                "\\brace": "\\left\\{{#1}\\right\\}"
                "\\ceil": "\\left\\lceil{#1}\\right\\rceil"
                "\\floor": "\\left\\lfloor{#1}\\right\\rfloor"
                "\\vert": "\\left\\lvert{#1}\\right\\rvert"
                "\\vec": "\\bm" # 默认使用粗体表示向量
                "\\vecc": "\\overrightarrow" # 默认使用上标箭头表示有向线段
                # 下面是一些文化课用的定义
                "\\poly": "\\ce{-\\!\\!\\![ #1 ]_n\\!\\!\\!\\!\\!-}" # 有机化学 聚合物
                "\\el": "#1\\mathrm{#2}^{#3}" # 结构化学 能级
                "\\pH": "p\\ce{H}"
                "\\pOH": "p\\ce{OH}"
                "\\con": "\\left[\\ce{#1}\\right]" # 化学计量 一般表示摩尔浓度
                # 下面都是一些不标准的 Unicode 转移
                "’": "'"
                "，": ","
                "。": "."
                "；": ";"
                "：": ":"
                "！": "!"
                "？": "?"
                "【": "["
                "】": "]"
                "（": "("
                "）": ")"
                "、": ","
                "—": "-"
                "…": "\\dots"
                "·": "\\cdot"
                "->": "\\to"
                "<-": "\\gets"
markdown_extensions:
- abbr
- admonition
- attr_list
- def_list
- footnotes
- md_in_html
- tables
-   toc:
        permalink: false
        toc_depth: 3
-   pymdownx.arithmatex:
        generic: true
- pymdownx.caret
- pymdownx.keys
- pymdownx.mark
- pymdownx.tilde
- pymdownx.betterem
- pymdownx.blocks.admonition
- pymdownx.blocks.details
- pymdownx.blocks.caption
- pymdownx.blocks.tab
-   pymdownx.highlight:
        anchor_linenums: true
        line_spans: __span
        pygments_lang_class: true
        linenums: true
- pymdownx.inlinehilite
-   pymdownx.snippets:
        auto_append:
        - docs/includes/abbreviations.md
- pymdownx.superfences
- pymdownx.magiclink
- pymdownx.smartsymbols
- pymdownx.tasklist
- pymdownx.tabbed
watch:
  - docs/includes